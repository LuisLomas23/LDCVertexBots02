<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 250px;
      border: none;
      border-radius: 8px;
      background: #0078d4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #005fa3;
    }

    #chatBox {
      width: 80%;
      max-width: 500px;
      height: 400px;
      margin: 20px auto;
      background: white;
      overflow-y: auto;
      border-radius: 10px;
      padding: 10px;
      text-align: left;
    }

    .msg {
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #0078d4;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e0e0e0;
      color: black;
      margin-right: auto;
    }

    .input-container {
      width: 80%;
      max-width: 500px;
      margin: auto;
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button.send {
      margin-left: 10px;
      padding: 10px;
    }
  </style>

</head>

<body>

<h2>Select Industry</h2>

<!-- STEP 1 -->

<div id="step1">
  <button class="btn" onclick="selectCategory('Retail')">Retail</button>
  <button class="btn" onclick="selectCategory('E-Commerce')">E-Commerce</button>
  <button class="btn" onclick="selectCategory('Finance')">Finance</button>
  <button class="btn" onclick="selectCategory('Healthcare')">Healthcare</button>
  <button class="btn" onclick="selectCategory('Education')">Education</button>
  <button class="btn" onclick="selectCategory('Other')">Other</button>
</div>

<!-- STEP 2 -->

<div id="step2" style="display:none;">
  <h2>Select Channel</h2>
  <button class="btn" onclick="selectChannel('voicebot')">Voicebot</button>
  <button class="btn" onclick="selectChannel('chatbot')">Chatbot</button>
</div>

<!-- CHAT -->

<div id="chat" style="display:none;">
  <h2>Chat</h2>

  <div id="chatBox"></div>

  <div class="input-container">
    <input id="msg" placeholder="Type your message..." />
    <button class="btn send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

let category = "";
let channel = "";
let sessionId = localStorage.getItem("sessionId") || null;

// 🔴 CAMBIA ESTO
const API_URL = "https://YOUR_FUNCTION_URL/api/ChatFunction";

// ======================
// STEP 1
// ======================
function selectCategory(cat) {
  category = cat;
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

// ======================
// STEP 2
// ======================
function selectChannel(ch) {
  channel = ch;

  if (ch === "chatbot") {
    document.getElementById("step2").style.display = "none";
    document.getElementById("chat").style.display = "block";
  } else {
    alert("Voicebot coming soon...");
  }
}

// ======================
// UI CHAT
// ======================
function addMessage(text, type) {
  const chatBox = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.classList.add("msg", type);
  div.innerText = text;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ======================
// SEND MESSAGE
// ======================
async function sendMessage() {
  const input = document.getElementById("msg");
  const message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        sessionId,
        category,
        channel,
        message
      })
    });

    const data = await res.json();

    sessionId = data.sessionId;
    localStorage.setItem("sessionId", sessionId);

    addMessage(data.reply, "bot");

  } catch (err) {
    addMessage("Error connecting to server", "bot");
  }
}

// ENTER para enviar
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

</script>

</body>
</html>
